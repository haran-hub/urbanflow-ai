services:
  - type: web
    name: urbanflow-ai-backend
    runtime: python
    rootDir: backend
    autoDeploy: yes
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////opt/render/project/src/urbanflow.db
      - key: FRONTEND_URL
        sync: false
      - key: OCM_API_KEY
        sync: false
      - key: API_511_KEY
        sync: false
    disk:
      name: urbanflow-db
      mountPath: /opt/render/project/src
      sizeGB: 1
